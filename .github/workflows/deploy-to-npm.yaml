name: Auto Release on Change

on:
  push:
    branches: [master]
  repository_dispatch:
    types: [trigger-deployment]
  workflow_dispatch:

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: yarn install --immutable

      - name: Configure Git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      # ------------------------------------------------------------------
      # 1. Detect GraphQL schema changes (drives bump severity for
      #    schema-dependent packages: typescript-sdk and react-sdk).
      # ------------------------------------------------------------------
      - name: Save current schema
        run: cp schema.graphql schema.graphql.before

      - name: Fetch latest schema from API
        run: yarn graphql:generate

      - name: Classify schema change
        id: schema
        run: |
          if diff -q schema.graphql.before schema.graphql > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "bump=patch" >> "$GITHUB_OUTPUT"
            echo "No schema changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            DIFF_OUTPUT=$(yarn graphql-inspector diff schema.graphql.before schema.graphql 2>&1 || true)
            echo "$DIFF_OUTPUT"
            if echo "$DIFF_OUTPUT" | grep -qi "BREAKING"; then
              echo "bump=minor" >> "$GITHUB_OUTPUT"
              echo "Breaking/dangerous changes detected → minor bump"
            else
              echo "bump=patch" >> "$GITHUB_OUTPUT"
              echo "Safe/additive changes detected → patch bump"
            fi
          fi
          rm -f schema.graphql.before

      # ------------------------------------------------------------------
      # 2. For every package, bump the version when its own source has
      #    changed since its last publish. Schema-dependent packages
      #    inherit the schema bump level when the schema changed.
      # ------------------------------------------------------------------
      - name: Bump versions for changed packages
        id: bumps
        env:
          SCHEMA_CHANGED: ${{ steps.schema.outputs.changed }}
          SCHEMA_BUMP: ${{ steps.schema.outputs.bump }}
        run: |
          set -e

          # Packages whose shipped code embeds the GraphQL schema.
          SCHEMA_DEPENDENT="typescript-sdk react-sdk"
          ALL_PACKAGES=(typescript-sdk react-sdk module-sdk create-module component-sdk create-component module-ui cli)

          is_schema_dependent() {
            for sdep in $SCHEMA_DEPENDENT; do
              [ "$1" = "$sdep" ] && return 0
            done
            return 1
          }

          # Bumps the version field in-place, preserving existing
          # indentation. We cannot use `npm version` here because the
          # workspace uses yarn `workspace:*` protocol specifiers which
          # npm rejects as EUNSUPPORTEDPROTOCOL.
          bump_version() {
            local file="packages/$1/package.json"
            local bump="$2"
            local current ma mi pa new
            current=$(node -p "require('./$file').version")
            IFS=. read -r ma mi pa <<< "$current"
            case "$bump" in
              patch) pa=$((pa + 1));;
              minor) mi=$((mi + 1)); pa=0;;
              major) ma=$((ma + 1)); mi=0; pa=0;;
            esac
            new="$ma.$mi.$pa"
            sed -i -E "s/(\"version\"[[:space:]]*:[[:space:]]*\")[0-9]+\.[0-9]+\.[0-9]+(\")/\1$new\2/" "$file"
            echo "$new"
          }

          # Prints one of: skip-bump | unchanged | changed
          #   skip-bump: not published yet, or local version already ahead of npm
          #   unchanged: nothing in the package dir changed since last publish
          #   changed:   source changed since last publish → bump needed
          needs_bump() {
            local pkg=$1 pkg_name local_version published_version git_head
            pkg_name=$(node -p "require('./packages/$pkg/package.json').name")
            local_version=$(node -p "require('./packages/$pkg/package.json').version")
            published_version=$(npm view "$pkg_name" version 2>/dev/null || echo "")

            if [ -z "$published_version" ] || [ "$local_version" != "$published_version" ]; then
              echo "skip-bump"
              return
            fi

            git_head=$(npm view "$pkg_name" gitHead 2>/dev/null || echo "")
            if [ -z "$git_head" ] || ! git cat-file -e "$git_head" 2>/dev/null; then
              git_head=$(git log -n 1 --pretty=format:%H -S "\"version\": \"$local_version\"" -- "packages/$pkg/package.json" 2>/dev/null || echo "")
            fi

            if [ -z "$git_head" ]; then
              echo "changed"
              return
            fi

            if git diff --quiet "$git_head" HEAD -- "packages/$pkg/"; then
              echo "unchanged"
            else
              echo "changed"
            fi
          }

          BUMPED=()

          for pkg in "${ALL_PACKAGES[@]}"; do
            state=$(needs_bump "$pkg")
            echo "🔍 $pkg: $state"

            [ "$state" != "changed" ] && continue

            bump="patch"
            if is_schema_dependent "$pkg" && [ "$SCHEMA_CHANGED" = "true" ]; then
              bump="$SCHEMA_BUMP"
            fi

            new_version=$(bump_version "$pkg" "$bump")
            echo "⬆️  $pkg bumped to $new_version ($bump)"
            BUMPED+=("$pkg@$new_version")
          done

          if [ ${#BUMPED[@]} -eq 0 ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "No packages needed bumping."
          else
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            summary=""
            for b in "${BUMPED[@]}"; do
              [ -z "$summary" ] && summary="$b" || summary="$summary, $b"
            done
            echo "summary=$summary" >> "$GITHUB_OUTPUT"
            echo "Bumped: $summary"
          fi

      # ------------------------------------------------------------------
      # 3. Commit and push bumps (with [skip ci] to avoid infinite loop).
      # ------------------------------------------------------------------
      - name: Commit version bumps
        if: steps.bumps.outputs.bumped == 'true'
        run: |
          git add schema.graphql
          git add packages/*/package.json
          git add packages/typescript-sdk/src/

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(release): bump ${{ steps.bumps.outputs.summary }} [skip ci]"
            git push
          fi

      # ------------------------------------------------------------------
      # 4. Build all packages.
      # ------------------------------------------------------------------
      - name: Build all packages
        run: |
          # skill-bundler provides the wp-bundle-skills binary used by
          # typescript-sdk and react-sdk prepublishOnly hooks — build first.
          yarn workspace @well-played.gg/skill-bundler build
          yarn workspace @well-played.gg/typescript-sdk build
          yarn workspace @well-played.gg/react-sdk build
          yarn workspace @well-played.gg/module-sdk build
          yarn workspace @well-played.gg/create-module build
          yarn workspace @well-played.gg/component-sdk build
          yarn workspace @well-played.gg/create-component build
          yarn workspace @well-played.gg/module-ui build
          yarn workspace @well-played.gg/cli build

      # ------------------------------------------------------------------
      # 5. Publish every package whose local version is ahead of npm.
      # ------------------------------------------------------------------
      - name: Publish packages that need publishing
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          publish_if_needed() {
            local pkg_dir=$1
            local pkg_name
            local local_version
            local published_version

            pkg_name=$(node -p "require('./packages/$pkg_dir/package.json').name")
            local_version=$(node -p "require('./packages/$pkg_dir/package.json').version")
            published_version=$(npm view "$pkg_name" version 2>/dev/null || echo "0.0.0")

            if [ "$local_version" = "$published_version" ]; then
              echo "⏭️  $pkg_name@$local_version already published, skipping."
            else
              echo "📦 Publishing $pkg_name@$local_version (npm has $published_version)..."
              cd "packages/$pkg_dir"
              npm publish --access public --provenance
              cd ../..
              echo "✅ $pkg_name@$local_version published."
            fi
          }

          # Publish in dependency order: typescript-sdk first, then dependents
          publish_if_needed "typescript-sdk"
          publish_if_needed "react-sdk"
          publish_if_needed "module-sdk"
          publish_if_needed "create-module"
          publish_if_needed "component-sdk"
          publish_if_needed "create-component"
          publish_if_needed "module-ui"
          publish_if_needed "cli"
