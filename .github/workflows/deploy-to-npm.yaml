name: Auto Release on Schema Change

on:
  push:
    branches: [master]
  repository_dispatch:
    types: [trigger-deployment]
  workflow_dispatch:

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: yarn install --immutable

      - name: Configure Git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      # ------------------------------------------------------------------
      # 1. Detect GraphQL schema changes
      # ------------------------------------------------------------------
      - name: Save current schema
        run: cp schema.graphql schema.graphql.before

      - name: Fetch latest schema from API
        run: yarn graphql:generate

      - name: Detect schema changes
        id: schema
        run: |
          if diff -q schema.graphql.before schema.graphql > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "bump=none" >> "$GITHUB_OUTPUT"
            echo "No schema changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"

            # Use graphql-inspector to classify the change
            DIFF_OUTPUT=$(yarn graphql-inspector diff schema.graphql.before schema.graphql 2>&1 || true)
            echo "$DIFF_OUTPUT"

            if echo "$DIFF_OUTPUT" | grep -qi "BREAKING"; then
              echo "bump=minor" >> "$GITHUB_OUTPUT"
              echo "Breaking/dangerous changes detected → minor bump"
            else
              echo "bump=patch" >> "$GITHUB_OUTPUT"
              echo "Safe/additive changes detected → patch bump"
            fi
          fi

          rm -f schema.graphql.before

      # ------------------------------------------------------------------
      # 2. Bump typescript-sdk + dependents if schema changed
      # ------------------------------------------------------------------
      - name: Bump typescript-sdk version
        if: steps.schema.outputs.changed == 'true'
        id: bump_ts
        working-directory: packages/typescript-sdk
        run: |
          OLD_VERSION=$(node -p "require('./package.json').version")
          npm version ${{ steps.schema.outputs.bump }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "old=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "typescript-sdk: $OLD_VERSION → $NEW_VERSION"

      - name: Bump react-sdk version (depends on typescript-sdk)
        if: steps.schema.outputs.changed == 'true'
        working-directory: packages/react-sdk
        run: |
          npm version ${{ steps.schema.outputs.bump }} --no-git-tag-version
          echo "react-sdk bumped (depends on typescript-sdk)"

      # ------------------------------------------------------------------
      # 3. Commit and push version bumps (skip CI to avoid infinite loop)
      # ------------------------------------------------------------------
      - name: Commit version bumps
        if: steps.schema.outputs.changed == 'true'
        run: |
          git add schema.graphql
          git add packages/typescript-sdk/package.json
          git add packages/react-sdk/package.json
          git add packages/typescript-sdk/src/

          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(release): bump typescript-sdk to ${{ steps.bump_ts.outputs.new }} and dependents [skip ci]"
            git push
          fi

      # ------------------------------------------------------------------
      # 4. Build all packages
      # ------------------------------------------------------------------
      - name: Build all packages
        run: |
          yarn workspace @well-played.gg/typescript-sdk build
          yarn workspace @well-played.gg/react-sdk build
          yarn workspace @well-played.gg/module-sdk build
          yarn workspace @well-played.gg/create-module build
          yarn workspace @well-played.gg/component-sdk build
          yarn workspace @well-played.gg/create-component build
          yarn workspace @well-played.gg/module-ui build
          yarn workspace @well-played.gg/cli build

      # ------------------------------------------------------------------
      # 5. Publish only packages whose version is not yet on npm
      # ------------------------------------------------------------------
      - name: Publish packages that need publishing
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          publish_if_needed() {
            local pkg_dir=$1
            local pkg_name
            local local_version
            local published_version

            pkg_name=$(node -p "require('./packages/$pkg_dir/package.json').name")
            local_version=$(node -p "require('./packages/$pkg_dir/package.json').version")
            published_version=$(npm view "$pkg_name" version 2>/dev/null || echo "0.0.0")

            if [ "$local_version" = "$published_version" ]; then
              echo "⏭️  $pkg_name@$local_version already published, skipping."
            else
              echo "📦 Publishing $pkg_name@$local_version (npm has $published_version)..."
              cd "packages/$pkg_dir"
              npm publish --access public --provenance
              cd ../..
              echo "✅ $pkg_name@$local_version published."
            fi
          }

          # Publish in dependency order: typescript-sdk first, then dependents
          publish_if_needed "typescript-sdk"
          publish_if_needed "react-sdk"
          publish_if_needed "module-sdk"
          publish_if_needed "create-module"
          publish_if_needed "component-sdk"
          publish_if_needed "create-component"
          publish_if_needed "module-ui"
          publish_if_needed "cli"
