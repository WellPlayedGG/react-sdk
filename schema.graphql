  """One- to two-line description of the format"""
  description: String!

  """Human-readable display name shown in the UI"""
  displayName: String!

  """
  Stable slug identifier (e.g. "single-elim"). Use this as the `builtinPresetId` argument on apply/duplicate mutations.
  """
  id: String!

